<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Meet Browser</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07070e;--card:#13131f;--border:#1c1c2e;--accent:#6c63ff;--accent2:#a78bfa;--green:#52b788;--red:#ff4d4d;--text:#eaeaf4;--muted:#4a4a6a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Rubik,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .wrap{width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;}
    h1{font-size:2rem;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#fff,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
    .sub{color:var(--muted);font-size:0.82rem;text-align:center;margin-bottom:8px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;}
    .label{font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
    input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-family:Rubik,sans-serif;font-size:0.86rem;color:var(--text);outline:none;direction:ltr;width:100%;}
    input:focus{border-color:rgba(108,99,255,0.5);}
    input::placeholder{color:var(--muted);}
    .btn{background:linear-gradient(135deg,#6c63ff,#4f46e5);color:#fff;border:none;border-radius:8px;padding:11px;font-family:Rubik,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;width:100%;transition:opacity 0.2s;}
    .btn:hover{opacity:0.85;}
    .btn:disabled{opacity:0.4;cursor:not-allowed;}
    .btn.green{background:linear-gradient(135deg,#52b788,#2d6a4f);}
    .status{padding:10px 14px;border-radius:8px;font-size:0.82rem;display:flex;align-items:center;gap:8px;display:none;}
    .status.show{display:flex;}
    .status.loading{background:rgba(167,139,250,0.1);color:var(--accent2);}
    .status.ok{background:rgba(82,183,136,0.1);color:var(--green);}
    .status.error{background:rgba(255,77,77,0.1);color:var(--red);}
    .spin{width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .divider{border:none;border-top:1px solid var(--border);margin:4px 0;}
    .qbar{display:flex;gap:5px;flex-wrap:wrap;}
    .ql{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:0.73rem;color:var(--muted);cursor:pointer;font-family:Rubik,sans-serif;}
    .ql:hover{border-color:var(--accent2);color:var(--accent2);}
    .browse-section{display:none;}
    .browse-section.show{display:flex;flex-direction:column;gap:10px;}
    .hint{font-size:0.72rem;color:var(--muted);text-align:center;}
  </style>
</head>
<body>
<div class="wrap">

  <div>
    <h1>🎥 Meet Browser</h1>
    <p class="sub">גלוש דרך Google Meet — הרשת רואה רק Meet</p>
  </div>

  <!-- כרטיס הגדרות -->
  <div class="card">
    <div class="label">כתובת השרת (Render)</div>
    <input id="serverUrl" type="text" placeholder="https://xxx.onrender.com" />

    <hr class="divider"/>

    <div class="label">קישור Google Meet שלך</div>
    <input id="meetUrl" type="text" placeholder="https://meet.google.com/abc-defg-hij"/>
    <p class="hint">פתח <a href="https://meet.google.com/new" target="_blank" style="color:var(--accent2);">meet.google.com/new</a> ← העתק את הקישור ← הדבק כאן</p>

    <button class="btn green" id="joinBtn" onclick="joinMeet()">🤖 הפעל שרת + הצטרף ל-Meet</button>
  </div>

  <!-- סטטוס -->
  <div class="status" id="status">
    <div class="spin"></div>
    <span id="statusText"></span>
  </div>

  <!-- גלישה — מופיע אחרי חיבור -->
  <div class="browse-section" id="browseSection">
    <div class="card">
      <div class="label">🌐 הכנס כתובת לגלישה</div>
      <input id="navUrl" type="text" placeholder="https://youtube.com"/>
      <button class="btn" onclick="navigate()">עבור ←</button>
      <div class="qbar">
        <button class="ql" onclick="go('https://google.com')">Google</button>
        <button class="ql" onclick="go('https://youtube.com')">YouTube</button>
        <button class="ql" onclick="go('https://wikipedia.org')">Wikipedia</button>
        <button class="ql" onclick="go('https://ynet.co.il')">Ynet</button>
        <button class="ql" onclick="go('https://github.com')">GitHub</button>
        <button class="ql" onclick="go('https://walla.co.il')">Walla</button>
      </div>
    </div>
    <p class="hint">השרת מגלש — אתה רואה הכל ב-Meet שפתוח אצלך &#128071;</p>
  </div>

</div>

<script>
  // שמור הגדרות
  var SERVER = localStorage.getItem('meet_server') || '';
  if (SERVER) document.getElementById('serverUrl').value = SERVER;

  async function joinMeet() {
    var server = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
    var meet   = document.getElementById('meetUrl').value.trim();

    if (!server) return alert('הכנס כתובת שרת!');
    if (!meet)   return alert('הכנס קישור Meet!');

    SERVER = server;
    localStorage.setItem('meet_server', SERVER);

    document.getElementById('joinBtn').disabled = true;
    setStatus('השרת מצטרף ל-Meet... (עד 30 שניות)', 'loading');

    try {
      var r = await fetch(SERVER + '/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: meet })
      });
      var d = await r.json();
      if (!d.success) throw new Error(d.error || 'שגיאה');

      setStatus('✅ השרת הצטרף! תראה אותו ב-Meet — עכשיו בחר אתר לגלישה', 'ok');
      document.getElementById('browseSection').classList.add('show');

    } catch(e) {
      setStatus('שגיאה: ' + e.message, 'error');
      document.getElementById('joinBtn').disabled = false;
    }
  }

  function navigate() {
    var url = document.getElementById('navUrl').value.trim();
    if (!url) return;
    if (!url.startsWith('http')) url = 'https://' + url;
    go(url);
  }

  async function go(url) {
    document.getElementById('navUrl').value = url;
    setStatus('מנווט ל-' + url + '...', 'loading');
    try {
      var r = await fetch(SERVER + '/navigate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      var d = await r.json();
      setStatus('✅ ' + (d.title || url), 'ok');
    } catch(e) {
      setStatus('שגיאה: ' + e.message, 'error');
    }
  }

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    document.getElementById('statusText').textContent = msg;
    el.className = 'status show ' + type;
    el.querySelector('.spin').style.display = type === 'loading' ? 'block' : 'none';
  }

  document.getElementById('navUrl').addEventListener('keydown', e => { if(e.key==='Enter') navigate(); });
  document.getElementById('meetUrl').addEventListener('keydown', e => { if(e.key==='Enter') joinMeet(); });
</script>
</body>
</html>
