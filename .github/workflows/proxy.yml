name: Proxy Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
      reqid:
        description: 'Request ID'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }}

      - name: Fetch URL
        run: |
          mkdir -p cache
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*" \
            "${{ inputs.url }}" > cache/${{ inputs.reqid }}.html

      - name: Commit result
        run: |
          git config user.email "proxy@proxy.com"
          git config user.name "Proxy Bot"
          git add cache/
          git commit -m "result:${{ inputs.reqid }}"
          git push
